<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud News</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #222535;
      --border: #2a2d3e;
      --accent-aws: #ff9900;
      --text-primary: #e8eaf0;
      --text-secondary: #8b8fa8;
      --text-link: #7c9cff;
      --radius: 10px;
      --transition: 0.18s ease;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-left h1 span {
      color: var(--text-link);
    }

    #last-updated {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    nav {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }

    .tab:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }

    .tab.active {
      background: var(--text-link);
      border-color: var(--text-link);
      color: #fff;
    }

    main {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
    }

    #count {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    #news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition), background var(--transition);
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
      background: var(--surface-hover);
      border-color: #3a3f5c;
    }

    .card a {
      text-decoration: none;
      color: inherit;
    }

    .card-source {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.73rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .source-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text-primary);
    }

    .card:hover .card-title {
      color: var(--text-link);
    }

    .card-date {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: auto;
    }

    #empty {
      display: none;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }

    #empty p { font-size: 1rem; margin-top: 8px; }

    #loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--text-link);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .header-inner { flex-direction: column; align-items: flex-start; }
      #news-grid { grid-template-columns: 1fr; }
      main { margin: 20px auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-left">
        <h1>☁️ <span>Cloud</span> News</h1>
        <div id="last-updated">Loading…</div>
      </div>
      <nav id="tabs">
        <button class="tab active" data-source="all">All</button>
        <button class="tab" data-source="AWS What's New">What's New</button>
        <button class="tab" data-source="AWS News Blog">News Blog</button>
        <button class="tab" data-source="AWS Architecture Blog">Architecture</button>
        <button class="tab" data-source="AWS Security Blog">Security</button>
      </nav>
    </div>
  </header>

  <main>
    <div id="count"></div>
    <div id="loading"><div class="spinner"></div>Loading news…</div>
    <div id="news-grid"></div>
    <div id="empty"><div style="font-size:2rem">🔍</div><p>No items for this filter.</p></div>
  </main>

  <script>
    const SOURCE_COLORS = {
      "AWS What's New": '#ff9900',
      'AWS News Blog': '#d45b07',
      'AWS Architecture Blog': '#1b660f',
      'AWS Security Blog': '#dd3522',
    };

    let allItems = [];
    let activeFilter = 'all';

    function formatDate(str) {
      try {
        return new Date(str).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric'
        });
      } catch { return str; }
    }

    function renderCards(items) {
      const grid = document.getElementById('news-grid');
      const empty = document.getElementById('empty');
      const count = document.getElementById('count');

      grid.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        count.textContent = '';
        return;
      }

      empty.style.display = 'none';
      count.textContent = `Showing ${items.length} item${items.length !== 1 ? 's' : ''}`;

      items.forEach(item => {
        const color = SOURCE_COLORS[item.source] || '#7c9cff';
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <a href="${escHtml(item.link)}" target="_blank" rel="noopener noreferrer">
            <div class="card-source" style="color:${color}">
              <span class="source-dot" style="background:${color}"></span>
              ${escHtml(item.source)}
            </div>
            <div class="card-title">${escHtml(item.title)}</div>
            <div class="card-date">${formatDate(item.pubDate)}</div>
          </a>
        `;
        // Make whole card clickable
        card.addEventListener('click', () => {
          window.open(item.link, '_blank', 'noopener,noreferrer');
        });
        grid.appendChild(card);
      });
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function applyFilter(source) {
      activeFilter = source;
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.source === source);
      });
      const filtered = source === 'all'
        ? allItems
        : allItems.filter(i => i.source === source);
      renderCards(filtered);
    }

    document.getElementById('tabs').addEventListener('click', e => {
      const tab = e.target.closest('.tab');
      if (tab) applyFilter(tab.dataset.source);
    });

    fetch('news.json')
      .then(r => {
        if (!r.ok) throw new Error('news.json not found');
        return r.json();
      })
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        allItems = data.items || [];
        const ts = data.lastUpdated
          ? `Last updated: ${new Date(data.lastUpdated).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' })}`
          : '';
        document.getElementById('last-updated').textContent = ts;
        applyFilter('all');
      })
      .catch(err => {
        document.getElementById('loading').innerHTML =
          `<p style="color:#e57373">Failed to load news.json: ${err.message}</p>`;
      });
  </script>
</body>
</html>
